<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="stylesheet" href="css/design-styles.css">
</head>
<body>

    <section class="section hero-section" id="hero">
    <div class="content content-top-right">
        <h1 class="hero-title thin">БЛИЖЕ К ЗВЁЗДАМ</h1>
        <div class="hero-sub thin">Твой проводник в бесконечность</div>
    </div>
    </section>

    <section class="section stats-section" id="stats">
        <div class="content">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number">10</div>
                    <div class="stat-label">ГАЛАКТИК</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">25</div>
                    <div class="stat-label">СПУТНИКОВ</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">15</div>
                    <div class="stat-label">ЗВЁЗД</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">15</div>
                    <div class="stat-label">ПЛАНЕТ</div>
                </div>
            </div>
        </div>
    </section>

     <section class="section call-section" id="call">
        <div class="content">
            <div class="description-text">
                Мы создали это пространство для тех, кто хочет узнать больше о планетах, звездах и бесконечности, которая нас окружает.
            </div>
            <button class="btn-table" id="gotoTableBtn">ПЕРЕЙТИ К ТАБЛИЦЕ</button>
        </div>
    </section>

    <script>
        document.getElementById('gotoTableBtn').addEventListener('click', function() {
            window.location.href = 'catalog.html';
        });
    </script>
</body>
</html>
